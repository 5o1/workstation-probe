# golangci-lint configuration (v2 schema).
# Docs: https://golangci-lint.run/product/migration-guide/

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - errcheck       # unhandled errors
    - govet          # standard library govet
    - staticcheck    # heavy hitter: nil deref, error wrapping, etc.
    - unused         # unused vars / funcs / imports
    - ineffassign    # unused assignments
    - gocritic       # style + perf hints
    - revive         # exported-name / doc-comment conventions
    # gofmt + goimports are part of the default set in v2.

  settings:
    gocritic:
      enabled-tags: [diagnostic, performance, style]
      disabled-checks: [hugeParam, rangeValCopy]

    revive:
      rules:
        - name: exported
          disabled: false
        - name: package-comments
        - name: var-naming
        - name: error-strings
        - name: error-naming

  exclusions:
    rules:
      # Test files: ignore errcheck (testing.T methods don't need it) and
      # gocritic style nits (test setup often needs the "obvious" path).
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - dupl       # test fixtures are repetitive by design

      # Vendored / generated / build output — never lint.
      - path: '.*\.(pb|gen)\.go$'
        linters: [all]

    # Skip entire subtrees that contain no Go code (Hugo content, test
    # fixtures, web assets).
    paths:
      - 'webview/hugo/exampleSite/.*'
      - 'webview/hugo/test/.*'
      - '.*\.html$'
      - '.*\.css$'
      - '.*\.js$'
      - '.*\.yaml$'
      - '.*\.yml$'
      - '.*\.md$'

    # Don't truncate output.
    max-issues-per-linter: 0
    max-same-issues: 0
