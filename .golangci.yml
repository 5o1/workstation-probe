# golangci-lint configuration (v2.5.0 schema).
# Migration guide: https://golangci-lint.run/docs/product/migration-guide

version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    # gofmt + goimports come from the standard set.

  settings:
    gocritic:
      enabled-tags: [diagnostic, performance, style]
      disabled-checks: [hugeParam, rangeValCopy]

    revive:
      rules:
        - name: exported
          disabled: false
        - name: package-comments
        - name: var-naming
        - name: error-strings
        - name: error-naming

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - dupl

      - path: '.*\.(pb|gen)\.go$'
        linters: [all]

    paths:
      - 'webview/hugo/exampleSite/.*'
      - 'webview/hugo/test/.*'
      - '.*\.html$'
      - '.*\.css$'
      - '.*\.js$'
      - '.*\.yaml$'
      - '.*\.yml$'
      - '.*\.md$'

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
