# golangci-lint configuration.
# Docs: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  # skip-dirs-use-default skips vendor/third_party/testdata/examples/Godeps/builtin
  # by default. We don't have any of those, but it's free insurance.
  skip-dirs-use-default: true
  # Don't go to the network for module downloads during a lint run.
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    # Built-in / standard.
    - govet          # standard library govet
    - ineffassign    # unused assignments
    - unused         # unused vars / funcs / imports
    - errcheck       # unhandled errors (strict; intentional ones use //nolint:errcheck)
    - staticcheck    # the heavy hitter: nil deref, error wrapping, etc.
    - gocritic       # style + perf hints
    - revive         # exported-name / doc-comment conventions (successor to golint)
    - gofmt          # enforce formatting
    - goimports      # enforce import grouping

linters-settings:
  gocritic:
    enabled-tags: [diagnostic, performance, style]
    disabled-checks: [hugeParam, rangeValCopy]  # common false positives for this codebase

  goimports:
    # Group project-local imports together, separate from stdlib + 3rd-party.
    local-prefixes: github.com/assaneko/workstation-probe

  revive:
    rules:
      - name: exported
        # Only require doc comments on exported types/funcs/constants, not
        # every field of every struct (the latter is noisy and rarely useful).
        disabled: false
      - name: package-comments
      - name: var-naming
      - name: error-strings
      - name: error-naming

issues:
  max-issues-per-linter: 0   # don't truncate — show everything
  max-same-issues: 0
  exclude-rules:
    # Test files: ignore errcheck (testing.T methods don't need it) and
    # gocritic style nits (test setup often needs the "obvious" path).
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - dupl          # test fixtures are repetitive by design

    # Vendored / generated / build output — never lint.
    - path: '.*\.(pb|gen)\.go$'
      linters: [all]

  # Don't fail the run on the noise we already document below.
  exclude: []

  # Skip entire subtrees that contain no Go code (Hugo content, test
  # fixtures, web assets). Modern location — the old `run.skip-files`
  # is deprecated.
  exclude-files:
    - 'webview/hugo/exampleSite/.*'
    - 'webview/hugo/test/.*'
    - '.*\.html$'
    - '.*\.css$'
    - '.*\.js$'
    - '.*\.yaml$'
    - '.*\.yml$'
    - '.*\.md$'
