name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Go: unit tests, race detector, vet, both build-tag variants.
  # ubuntu-latest ships with nvidia-driver, so libnvidia-ml.so is on disk
  # and `go build -tags nvml` links successfully. The default (stub) build
  # is what ships in releases for hosts without the driver.
  # ---------------------------------------------------------------------
  go:
    name: go (ubuntu, ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Test (race)
        run: CGO_ENABLED=1 go test -race -timeout 60s ./...

      - name: Vet
        run: go vet ./...

      - name: Build (stub GPU collector, default)
        run: CGO_ENABLED=1 go build ./...

      - name: Build (NVML-backed GPU collector)
        # NVML via cgo; needs libnvidia-ml.so on the runner.
        run: CGO_ENABLED=1 go build -tags nvml ./...

  # ---------------------------------------------------------------------
  # Lint: golangci-lint aggregates govet, staticcheck, errcheck, etc.
  # Keep the version pinned so a new release can't break CI on a whim.
  # ---------------------------------------------------------------------
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --timeout=5m

  # ---------------------------------------------------------------------
  # Webview: Hugo snapshot test. Same `run.sh` developers run locally —
  # CI just gets to verify the goldens stay byte-stable.
  # ---------------------------------------------------------------------
  webview:
    name: webview (hugo snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          HUGO_VERSION=0.142.0
          curl -fsSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo install /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Snapshot test
        run: ./webview/hugo/test/run.sh
