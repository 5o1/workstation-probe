{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
      <time class="post-date" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2006-01-02" }}</time>
    {{ end }}
  </header>
  <div class="post-content">
    {{- .Content }}
  </div>
</article>
{{ end }}
